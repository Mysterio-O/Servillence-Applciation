services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: surveilwin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: apps/SurveilWin.Api/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "${DB_CONNECTION_STRING:-Host=postgres;Database=surveilwin;Username=postgres;Password=postgres}"
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__Issuer: "${JWT_ISSUER:-surveilwin-api}"
      Jwt__Audience: "${JWT_AUDIENCE:-surveilwin-clients}"
      Jwt__ExpiryMinutes: "${JWT_EXPIRY_MINUTES:-60}"
      Jwt__RefreshTokenDays: "${JWT_REFRESH_TOKEN_DAYS:-30}"
      Email__Provider: "${EMAIL_PROVIDER:-Log}"
      App__DashboardUrl: "${APP_DASHBOARD_URL:-http://localhost:5173}"
      App__ScreenshotsDir: "${APP_SCREENSHOTS_DIR:-data/screenshots}"
      Ai__Provider: "${AI_PROVIDER:-ollama}"
      Ai__OllamaUrl: "${AI_OLLAMA_URL:-http://ollama:11434}"
      Ai__OllamaModel: "${AI_OLLAMA_MODEL:-llama3.2}"
      Jobs__ShiftAutoCloseIntervalMinutes: "${JOBS_SHIFT_AUTO_CLOSE_INTERVAL_MINUTES:-60}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: apps/SurveilWin.Web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
  ollama_data:
